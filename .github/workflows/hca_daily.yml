name: HCA Daily Execution

on:
  schedule:
    - cron: '0 0 * * 1-5' # 00:00 UTC -> 07:00 AM ICT, Mon-Fri
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-hca:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run HCA System
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
        run: |
          python main.py --mode hybrid --primary HHV --watchlist "TOS,NKG,AAS" --cap 50000000 --min_score 3.8
          
      - name: Commit and Push Logs
        run: |
          git config --global user.name "HCA System Bot"
          git config --global user.email "bot@hca.dev"
          git add execution_log.json history.csv portfolio.json
          git commit -m "chore: update daily execution logs [skip ci]" || exit 0
          git push
